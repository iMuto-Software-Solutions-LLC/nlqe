- id: test_group_by_category
  category: grouping
  difficulty: medium
  description: Group by single column with aggregation
  datasource:
    path: fixtures/transactions.parquet
    type: parquet
  user_query: What is the total revenue by product category?
  expected_sql: 'SELECT category, SUM(amount) as total_revenue

    FROM transactions

    GROUP BY category

    ORDER BY total_revenue DESC

    '
  expected_results:
  - category: Electronics
    total_revenue: 629353.5300000001
  - category: Home
    total_revenue: 147168.98999999996
  - category: Sports
    total_revenue: 81290.18999999992
  - category: Clothing
    total_revenue: 41999.4
  - category: Food
    total_revenue: 14001.650000000001
  expected_answer_summary: Electronics leads with $350,000, followed by Clothing at
    $300,000, Food at $250,000, Home at $200,000, and Sports at $150,000.
  acceptable_variance: 0.05
  priority: high
  tags:
  - group-by
  - aggregation
  - sorting
- id: test_group_by_with_count
  category: grouping
  difficulty: medium
  description: Group by with COUNT
  datasource:
    path: fixtures/transactions.parquet
    type: parquet
  user_query: How many transactions are there for each category?
  expected_sql: 'SELECT category, COUNT(*) as num_transactions

    FROM transactions

    GROUP BY category

    ORDER BY num_transactions DESC

    '
  expected_results:
  - category: Home
    num_transactions: 531
  - category: Electronics
    num_transactions: 497
  - category: Food
    num_transactions: 497
  - category: Clothing
    num_transactions: 496
  - category: Sports
    num_transactions: 479
  expected_answer_summary: Electronics has 700 transactions, Clothing has 600, Food
    has 500, Home has 400, and Sports has 300.
  acceptable_variance: 0.0
  priority: high
  tags:
  - group-by
  - count
  - frequency
- id: test_inner_join_revenue_by_region
  category: join
  difficulty: medium
  description: Simple INNER JOIN with aggregation
  datasource:
    path: fixtures/transactions.parquet
    type: parquet
  user_query: Show revenue by region name
  expected_sql: 'SELECT r.name as region, SUM(t.amount) as total_revenue

    FROM transactions t

    INNER JOIN regions r ON t.region_id = r.region_id

    GROUP BY r.name

    ORDER BY total_revenue DESC

    '
  expected_results:
  - region: North America
    total_revenue: 250540.06
  - region: Europe
    total_revenue: 234444.02000000005
  - region: Asia
    total_revenue: 208941.98999999987
  - region: Africa
    total_revenue: 122244.28000000001
  - region: South America
    total_revenue: 97643.41
  expected_answer_summary: North America leads with $500,000 in revenue, followed
    by Europe with $350,000.
  acceptable_variance: 0.05
  priority: high
  tags:
  - join
  - aggregation
  - group-by
