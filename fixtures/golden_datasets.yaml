  - id: "test_region_names"
    category: "filtering"
    difficulty: "easy"
    description: "List all regions"
    datasource:
      path: "fixtures/transactions.parquet"
      type: "parquet"
    user_query: "What are all the regions?"
    expected_sql: "SELECT DISTINCT name FROM regions ORDER BY name"
    expected_results:
      - name: "Africa"
      - name: "Asia"
      - name: "Europe"
      - name: "North America"
      - name: "South America"
    expected_answer_summary: "There are 5 geographic regions: Africa, Asia, Europe, North America, and South America."
    acceptable_variance: 0.0
    priority: "medium"
    tags: ["distinct", "region"]

  - id: "test_transactions_by_customer"
    category: "grouping"
    difficulty: "medium"
    description: "Count transactions per customer"
    datasource:
      path: "fixtures/transactions.parquet"
      type: "parquet"
    user_query: "How many transactions does each customer have?"
    expected_sql: |
      SELECT c.customer_id, c.name, COUNT(t.transaction_id) as num_transactions
      FROM customers c
      LEFT JOIN transactions t ON c.customer_id = t.customer_id
      GROUP BY c.customer_id, c.name
      ORDER BY num_transactions DESC
      LIMIT 10
    expected_results:
      - customer_id: 1
        name: "Customer1"
        num_transactions: 20
      - customer_id: 2
        name: "Customer2"
        num_transactions: 18
      - customer_id: 3
        name: "Customer3"
        num_transactions: 15
    expected_answer_summary: "The top 10 customers have between 20 and 5 transactions each, with Customer1 leading at 20 transactions."
    acceptable_variance: 0.0
    priority: "medium"
    tags: ["group-by", "left-join", "count"]

  - id: "test_gold_tier_customers"
    category: "filtering"
    difficulty: "medium"
    description: "Filter for Gold tier customers"
    datasource:
      path: "fixtures/transactions.parquet"
      type: "parquet"
    user_query: "Show all Gold tier customers"
    expected_sql: "SELECT * FROM customers WHERE tier = 'Gold' ORDER BY lifetime_value DESC"
    expected_results:
      - customer_id: 5
        name: "Premium Customer"
        tier: "Gold"
        lifetime_value: 50000.0
      - customer_id: 10
        name: "Valued Customer"
        tier: "Gold"
        lifetime_value: 45000.0
    expected_answer_summary: "There are Gold tier customers with high lifetime values, starting with Premium Customer at $50,000."
    acceptable_variance: 0.0
    priority: "medium"
    tags: ["filtering", "tier"]
