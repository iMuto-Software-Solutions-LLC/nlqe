- id: test_return_analysis
  category: complex
  difficulty: hard
  description: Analyze returns vs regular transactions
  datasource:
    path: fixtures/transactions.parquet
    type: parquet
  user_query: Show return rate by category
  expected_sql: "SELECT \n  category,\n  COUNT(*) as total_transactions,\n  SUM(CASE\
    \ WHEN is_return = true THEN 1 ELSE 0 END) as num_returns,\n  ROUND(100.0 * SUM(CASE\
    \ WHEN is_return = true THEN 1 ELSE 0 END) / COUNT(*), 2) as return_rate_pct,\n\
    \  SUM(CASE WHEN is_return = true THEN amount ELSE 0 END) as return_value\nFROM\
    \ transactions\nGROUP BY category\nORDER BY return_rate_pct DESC\n"
